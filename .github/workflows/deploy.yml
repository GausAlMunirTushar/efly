name: Deploy bijoyAir

on:
    push:
        branches:
            - main

jobs:
    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout repository
              uses: actions/checkout@v3

            - name: Set up SSH key
              uses: webfactory/ssh-agent@v0.5.3
              with:
                  ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

            - name: Deploy to VPS via SSH
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.VPS_HOST }}
                  username: ${{ secrets.VPS_USER }}
                  key: ${{ secrets.VPS_SSH_KEY }}
                  script: |
                      set -e
                      echo "Starting deployment..."

                      # Navigate to the project directory
                      cd /var/www/bijoyair.com.bd || exit 1

                      # Load NVM and set the correct Node/Yarn path
                      export NVM_DIR="$HOME/.nvm"
                      [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
                      [ -s "$NVM_DIR/bash_completion" ] && \. "$NVM_DIR/bash_completion"
                      export PATH="$NVM_DIR/versions/node/v22.15.0/bin:$PATH"

                      echo "Using Node: $(node -v)"
                      echo "Using Yarn: $(yarn -v)"

                      # Pull latest code
                      git pull origin main || exit 1

                      # Install dependencies
                      yarn install || exit 1

                      # Build project
                      yarn build || exit 1

                      # Restart with PM2
                      pm2 restart bijoyair-app || pm2 start npm --name "bijoyair-app" -- start || exit 1

                      echo "✅ Deployment successful"
